name: test

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  node-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # Zero-dep repo: no install step, the built-in runner is the framework.
      - run: node --test 'cadence-core/bin/*.test.mjs'
